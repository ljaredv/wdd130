<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<body>
  <header>
    <h1>WDD 130 Poll Form</h1>
  </header>
<form>
    <h2>Contact Information</h2>
<div class="form-item column2">
  <label for="fullname">Full Name:</label>
  <input type="text" id="fullname" name="fullname" required>
</div>  
<div class="form-item column2">
<label for="useremail">Email:</label>
  <input type="email" id="useremail" name="useremail" required>
</div>
<h2>Questions</h2>
<div class="form-item column1">
<label for="browser">What is your favorite browser?</label>
<select name="browser" id="browser">
  <option value="1">Chrome</option>
  <option value="2">Brave</option>
  <option value="3">Firefox</option>
</select>
</div>
<div class="form-item column1">
  <label for="pet">Do you have a household pet?</label>
  <input type="checkbox" id="pet" name="pet">
</div>
<div class="form-item full-width">
<label for="feedback">List the places you have lived:</label>
<textarea id="feedback" name="feedback" rows="4"  placeholder="Piura, Lima, Trujillo, Arequipa"></textarea> 
</div>
<button type="sbmit">Submit contact information</button>
</form> 
</body>
</html>
